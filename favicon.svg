<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" rx="12" fill="#080808"/>
  <rect width="64" height="64" rx="12" fill="url(#bg)"/>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#111"/>
      <stop offset="100%" stop-color="#080808"/>
    </linearGradient>
  </defs>
  <!-- K letter -->
  <text x="11" y="46" font-family="Georgia, serif" font-size="36" font-weight="400" fill="#C9813A" letter-spacing="-1">K</text>
  <!-- D letter -->
  <text x="34" y="46" font-family="Georgia, serif" font-size="36" font-weight="400" fill="#E8E0D4" letter-spacing="-1">D</text>
  <!-- bottom gold line -->
  <rect x="11" y="50" width="42" height="1.5" rx="1" fill="#C9813A" opacity="0.6"/>
</svg>
